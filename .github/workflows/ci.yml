name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  frontend-ci:
    name: Frontend (Vue 3)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/frontend

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 9

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: src/frontend/pnpm-lock.yaml

      # Run `pnpm install` locally first to generate pnpm-lock.yaml, then commit it.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm type-check

      - name: Test with coverage
        run: pnpm test:coverage

      - name: Build
        run: pnpm build

  backend-ci:
    name: Backend (Django)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/backend

    # 以下 env 值皆為 CI job 壽命內的 throwaway credentials：
    #   - PG service container 只活在這個 job 內，job 結束即銷毀，不對外開 port
    #   - Django SECRET_KEY / JWT_SIGNING_KEY 只用於跑測試，不簽任何真實 token
    # 命名刻意帶 `ci-*-not-used-in-production` 字樣：
    #   (1) 讓 gitleaks / secret-scanner 掃到時憑 allow-list 規則豁免，
    #       不會誤判為「生產密碼洩漏」；
    #   (2) 讓讀 workflow 的人一眼看出語意，不會誤抄到其他環境。
    # 若未來改成真正的 secret（例如跑 E2E 需要 SaaS test account），請移到
    # Repository Settings → Secrets 以 `secrets.XXX` 引用，而非在此明文填入。
    services:
      postgres:
        # 與 docker-compose.yml 及 k8s manifests 同步固定 16-alpine；
        # 三處共用同一版號避免 CI 綠燈但 prod 行為不同（PG 版本間 partial index、
        # planner 估算、sequence 表現都有差異）。
        image: postgres:16-alpine
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ci-only-password-not-for-any-real-system
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_SETTINGS_MODULE: config.settings.development
      SECRET_KEY: ci-secret-key-not-used-in-production
      DB_NAME: test_db
      DB_USER: postgres
      DB_PASSWORD: ci-only-password-not-for-any-real-system
      DB_HOST: localhost
      DB_PORT: "5432"
      JWT_SIGNING_KEY: ci-jwt-key-not-used-in-production-32chars

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          python-version: "3.12"
          enable-cache: true

      # Run `uv sync` locally first to generate uv.lock, then commit it.
      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint (Ruff)
        run: uv run ruff check .

      - name: Format check (Ruff)
        run: uv run ruff format --check .

      - name: Type check (Mypy)
        run: uv run mypy . --ignore-missing-imports

      - name: Security scan (Bandit)
        run: uv run bandit -r apps config -c pyproject.toml

      - name: Run migrations
        run: uv run python manage.py migrate

      - name: Test with coverage
        run: uv run pytest --cov=apps --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4
        with:
          files: coverage.xml
        continue-on-error: true

  secrets-scan:
    # Dependabot 觸發的 workflow 拿到的是受限 GITHUB_TOKEN，gitleaks-action 呼叫
    # API 會 403。Dependabot 只改依賴版號不會引入秘密，跳過不減防護
    # （push 到 main 與一般 PR 照掃）。
    if: ${{ github.actor != 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Scan for secrets
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  k8s-lint:
    name: K8S Manifest Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Validate K8S manifests (dry-run)
        run: |
          for file in infra/k8s/**/*.yml infra/k8s/*.yml; do
            echo "Validating $file..."
            kubectl apply --dry-run=client -f "$file" 2>/dev/null || echo "Skipped: $file"
          done
        continue-on-error: true

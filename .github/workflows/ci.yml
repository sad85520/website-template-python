name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  frontend-ci:
    name: Frontend (Vue 3)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/frontend

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: src/frontend/pnpm-lock.yaml

      # Run `pnpm install` locally first to generate pnpm-lock.yaml, then commit it.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm type-check

      - name: Test with coverage
        run: pnpm test:coverage

      - name: Build
        run: pnpm build

  backend-ci:
    name: Backend (Django)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_SETTINGS_MODULE: config.settings.development
      SECRET_KEY: ci-secret-key-not-used-in-production
      DB_NAME: test_db
      DB_USER: postgres
      DB_PASSWORD: testpassword
      DB_HOST: localhost
      DB_PORT: "5432"
      JWT_SIGNING_KEY: ci-jwt-key-not-used-in-production-32chars

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      # Run `uv sync` locally first to generate uv.lock, then commit it.
      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint (Ruff)
        run: uv run ruff check .

      - name: Type check (Mypy)
        run: uv run mypy . --ignore-missing-imports

      - name: Run migrations
        run: uv run python manage.py migrate

      - name: Test with coverage
        run: uv run pytest --cov=apps --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
        continue-on-error: true

  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  k8s-lint:
    name: K8S Manifest Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate K8S manifests (dry-run)
        run: |
          for file in infra/k8s/**/*.yml infra/k8s/*.yml; do
            echo "Validating $file..."
            kubectl apply --dry-run=client -f "$file" 2>/dev/null || echo "Skipped: $file"
          done
        continue-on-error: true

name: CD (K8s) — Promote to Production

# ====================================================================
# K8s-only workflow. Only relevant if the project has opted into k8s
# (see docs/scaling-to-k8s.md for the decision thresholds).
#
# 本 workflow 會把指定 image tag 套到 `infra/k8s/{backend,frontend}/deployment.yml`
# 並 commit 到 main。Compose 部署的專案不需要本檔——Compose 側升版是在目標 VM 上
# `docker compose pull && docker compose up -d`（見 docs/deployment.md）。
# ====================================================================
#
# Production deployment is triggered manually after QA sign-off.
# Trigger via GitHub Actions UI or CLI:
#   gh workflow run cd-k8s-production.yml -f sha=<short-sha>
#
# If sha input is omitted, the latest image (tagged "latest") is used.

on:
  workflow_dispatch:
    inputs:
      sha:
        description: 'Short SHA to deploy (e.g. a1b2c3d). Leave empty to use latest.'
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

# 防止同時多次 prod promote 造成 git push 交錯。
concurrency:
  group: cd-k8s-production
  cancel-in-progress: false

jobs:
  # 純讀取 job 負責 sed / 字串組裝，產出 artifact；contents:write 的 job
  # 只做 git commit + push，不執行其他邏輯，降低攻擊面。
  prepare-production-manifests:
    name: Prepare Production Manifests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: main
          persist-credentials: false

      - name: Resolve image tag
        id: tag
        run: |
          if [ -n "${{ inputs.sha }}" ]; then
            echo "tag=sha-${{ inputs.sha }}" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
          fi

      - name: Update image tags in production K8S manifests
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          sed -i "s|image: ghcr.io/.*/frontend:.*|image: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/frontend:${TAG}|g" infra/k8s/frontend/deployment.yml
          sed -i "s|image: ghcr.io/.*/backend:.*|image: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/backend:${TAG}|g" infra/k8s/backend/deployment.yml

      - name: Upload updated manifests
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: production-manifests
          path: infra/k8s/
          retention-days: 1

      - name: Persist tag for downstream job
        run: echo "${{ steps.tag.outputs.tag }}" > /tmp/tag.txt

      - name: Upload resolved tag
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: production-tag
          path: /tmp/tag.txt
          retention-days: 1

  # Branch protection 設定要求：main 需允許 github-actions[bot] bypass
  # （或另設 deploy key），否則 push 會失敗——這是預期行為，強迫保護規則就位。
  commit-production-manifests:
    name: Commit Production Manifests
    runs-on: ubuntu-latest
    needs: prepare-production-manifests
    environment: production
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Download updated manifests
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: production-manifests
          path: infra/k8s/

      - name: Download resolved tag
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: production-tag
          path: /tmp/

      - name: Commit & push
        run: |
          TAG=$(cat /tmp/tag.txt)
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add infra/k8s/
          git diff --staged --quiet || git commit -m "chore: promote ${TAG} to production"
          git push

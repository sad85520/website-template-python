name: CD — Build & Push Images

# 主線 CD：只負責把 image 推到 GHCR，不假設部署目標。
# Compose 部署：VM 上執行 `docker compose pull && docker compose up -d`（見 docs/deployment.md）。
# K8s 部署：另外啟用 `cd-k8s-staging.yml` / `cd-k8s-production.yml`（opt-in，見 docs/scaling-to-k8s.md）。

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

# 防止同分支多次 build 交錯浪費 runner 時間（image tag 以 SHA 唯一化，不會互相覆蓋）。
concurrency:
  group: cd-build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    # 最小權限：build job 只需讀取原始碼 + 推 image 到 ghcr。
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # 不在 workspace 留下帶 token 的 .git/config，降低後續 step（例如
          # `docker build` 帶的使用者腳本）竊取 token 的風險。
          persist-credentials: false

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (frontend)
        id: meta-frontend
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/frontend
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Extract metadata (backend)
        id: meta-backend
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/backend
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build & push frontend image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ./src/frontend
          file: ./src/frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}

      - name: Build & push backend image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ./src/backend
          file: ./src/backend/Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}

  # QA 標籤流程獨立成 job，只拿 pull-requests / issues 的 write 權限，
  # 不碰 contents。label 流程失敗不影響 image 已 push 的事實。
  signal-qa:
    name: Signal QA — flip ready-for-ci to ready-for-qa
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      pull-requests: write
      issues: write

    steps:
      - name: Flip labels on merged PR and linked issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=$(gh pr list --state merged --search "${{ github.sha }}" --json number --jq '.[0].number' --repo "${{ github.repository }}")
          if [ -z "$PR_NUMBER" ]; then
            echo "No merged PR found for ${{ github.sha }} — skipping QA label flip."
            exit 0
          fi
          echo "Flipping labels on PR #$PR_NUMBER"
          gh pr edit "$PR_NUMBER" --add-label "ready-for-qa" --remove-label "ready-for-ci" --repo "${{ github.repository }}" || true
          gh pr view "$PR_NUMBER" --json body --jq '.body' --repo "${{ github.repository }}" \
            | grep -oiE '(close[sd]?|fix(es|ed)?|resolve[sd]?) #[0-9]+' \
            | grep -oE '[0-9]+' \
            | sort -u \
            | while read -r ISSUE; do
                echo "Flipping labels on issue #$ISSUE"
                gh issue edit "$ISSUE" --add-label "ready-for-qa" --remove-label "ready-for-ci" --repo "${{ github.repository }}" || true
              done

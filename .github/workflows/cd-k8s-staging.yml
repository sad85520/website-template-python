name: CD (K8s) — Update Staging Manifests

# ====================================================================
# K8s-only workflow. Disabled by default.
#
# 預設範本以 Docker Compose 為主要部署方式（見 docs/deployment.md）。
# 當專案擴大到需要 k8s（見 docs/scaling-to-k8s.md 的決策門檻），啟用本檔：
#
#   1. 取消下方 `workflow_run` 觸發的註解、移除 `workflow_dispatch` 就只剩 auto 路徑
#      （或同時保留手動觸發做 backfill）
#   2. 確認 Branch protection 允許 `github-actions[bot]` bypass main 的 push 限制
#   3. 本 workflow 會修改 `infra/k8s/{backend,frontend}/deployment.yml` 的 image tag
#      並 commit 回 main；未啟用 k8s 的專案請勿開啟，否則會在 git log 留下無意義的
#      staging manifest 提交。
# ====================================================================

on:
  # 預設只允許手動觸發，避免未啟用 k8s 的專案意外跑到 manifest commit 流程。
  workflow_dispatch:
  # 啟用 k8s 自動化時，取消下方註解，讓 CI 成功後自動更新 staging manifest：
  # workflow_run:
  #   workflows: ["CI"]
  #   types: [completed]
  #   branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

# 防止同分支多次 staging deploy 交錯，導致 git push 互相覆蓋或製造無意義的 race。
concurrency:
  group: cd-k8s-staging-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # 只負責「改 manifest 檔」的純讀取 job，產出 artifact 供下一個 write job 消費。
  # 把 sed / 字串組裝這類較複雜的邏輯留在 contents:read 的 job，讓真正拿到
  # contents:write 的 job 只跑最小限度的 git commit + push 指令，降低攻擊面。
  prepare-staging-manifests:
    name: Prepare Staging Manifests
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Update image tags in staging K8S manifests
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          sed -i "s|image: ghcr.io/.*/frontend:.*|image: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/frontend:sha-${SHORT_SHA}|g" infra/k8s/frontend/deployment.yml
          sed -i "s|image: ghcr.io/.*/backend:.*|image: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/backend:sha-${SHORT_SHA}|g" infra/k8s/backend/deployment.yml

      - name: Upload updated manifests
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: staging-manifests
          path: infra/k8s/
          retention-days: 1

  # 只做 git commit + push，不做任何其他邏輯。即使未來 prepare job 被注入
  # 惡意內容，此 job 也只是把 artifact 內容原樣 commit，沒有執行任意 shell 的空間。
  # Branch protection 的設定要求：main 需允許 github-actions[bot] bypass
  # （或另設 deploy key），否則此步驟會失敗——這是預期行為，強迫保護規則就位。
  commit-staging-manifests:
    name: Commit Staging Manifests
    runs-on: ubuntu-latest
    needs: prepare-staging-manifests
    environment: staging
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download updated manifests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: staging-manifests
          path: infra/k8s/

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add infra/k8s/
          git diff --staged --quiet || git commit -m "chore: update staging k8s image tags to sha-$(echo '${{ github.sha }}' | cut -c1-7)"
          git push

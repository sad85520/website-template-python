services:
  # Redis is prod-only: development uses per-process LocMemCache (see
  # config/settings/base.py), while config/settings/production.py fail-fasts
  # when REDIS_URL is missing — DRF throttle counters need a shared cache.
  # No volume: it stores only cache/throttle state, safe to lose on restart.
  redis:
    image: redis:8-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    # !reset is required: compose v2 merges list-typed fields additively, so
    # `volumes: []` on its own would not remove base's `./src/backend:/app`
    # bind mount — which would mask the image's /app (including .venv) at runtime.
    volumes: !reset []
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DEBUG: "False"
      REDIS_URL: "redis://redis:6379/0"
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    # Same reason as backend: need !reset to drop base's dev bind mounts.
    volumes: !reset []
    # Drop base's `5173:5173` (Vite dev). In prod the outer nginx reverse-proxies
    # to frontend over the compose network; no need to publish a host port.
    ports: !reset []

  nginx:
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro

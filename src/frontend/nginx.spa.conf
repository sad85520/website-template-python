server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers — mirrored from infra/nginx/nginx.conf so the container
    # is safe even when deployed standalone (no upstream reverse proxy).
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self';" always;
    # HSTS: intentionally NOT set. This container listens on :8080 plain HTTP;
    # RFC 6797 §8.1 mandates browsers MUST ignore HSTS received over non-TLS,
    # so setting it here would be dead config. TLS termination is expected at
    # ingress / CDN / outer nginx, which is where HSTS should be emitted.

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 靜態資源快取
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}

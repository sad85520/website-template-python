events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    upstream backend {
        server backend:8000;
    }

    # Frontend is a Vue SPA served by its own nginx (see src/frontend/nginx.spa.conf)
    # listening on :8080. This outer nginx reverse-proxies to it; it does NOT serve
    # files from disk (the container's /usr/share/nginx/html is empty on purpose).
    upstream frontend {
        server frontend:8080;
    }

    server {
        listen 80;
        server_name _;

        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        # CSP: script-src is strict 'self'. style-src keeps 'unsafe-inline'
        # because Vue's scoped styles and some UI libs inject inline <style>.
        # If your app forbids inline styles, tighten to 'self' here too.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self';" always;
        # HSTS: this server listens on :80 only. When TLS terminates upstream
        # (ingress, CDN), move this header there, or add a :443 server block
        # and keep the header inside it.
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # API 反向代理
        location /api/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Django Admin（生產環境選配）
        location /admin/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # Django 靜態檔案
        location /static/ {
            proxy_pass http://backend;
        }

        # SPA + 靜態資產：一律轉給 frontend image 的 nginx。
        # 快取 header 由 frontend nginx.spa.conf 負責，避免在兩層同時設定造成衝突。
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}

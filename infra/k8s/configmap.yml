apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: web-template
data:
  DJANGO_SETTINGS_MODULE: "config.settings.production"
  DEBUG: "False"
  DB_NAME: "website_template"
  DB_USER: "postgres"
  DB_HOST: "postgres-service"
  DB_PORT: "5432"
  ALLOWED_HOSTS: "app.example.com"
  # Redis 在 prod 為必要依賴：DRF throttling / cache-backed rate limit 需要跨 pod
  # 共享計數，HPA scale-out 下 LocMemCache 會讓每個 pod 各持計數 → 限流被放大 N 倍。
  # production.py 已改為 REDIS_URL 未設即 ImproperlyConfigured，避免靜默降級。
  REDIS_URL: "redis://redis-service:6379/0"
